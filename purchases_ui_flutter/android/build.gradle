group 'com.revenuecat.purchases_ui_flutter'
version '10.2.0'

buildscript {
    ext.kotlin_version = '1.9.20'
    ext.common_version = '18.9.1'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

// AGP 9+ provides built-in Kotlin support, so we should only apply the
// kotlin-android plugin on older AGP versions. See:
// https://docs.flutter.dev/release/breaking-changes/migrate-to-built-in-kotlin/for-plugin-authors
def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
if (agpMajor < 9) {
    apply plugin: 'kotlin-android'
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.revenuecat.purchases_ui_flutter'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 24
        compileSdk 34
        // Fix variant resolution for purchases-android local builds
        missingDimensionStrategy 'apis', 'defaults'
        missingDimensionStrategy 'billingclient', 'bc8'
    }

    // On AGP < 9 we apply kotlin-android ourselves, which exposes the legacy
    // android.kotlinOptions DSL. On AGP 9+ kotlin-android is not applied and
    // the new top-level kotlin.compilerOptions DSL is used instead (below).
    if (agpMajor < 9) {
        kotlinOptions {
            jvmTarget = '1.8'
        }
    }
    
    dependencies {
        implementation "com.revenuecat.purchases:purchases-hybrid-common-ui:$common_version"
        implementation 'androidx.compose.ui:ui-android:1.5.4'
    }
}

// AGP 9+ ships with built-in Kotlin (KGP 2.2.10+), which exposes the new
// top-level kotlin.compilerOptions DSL. The legacy android.kotlinOptions
// block above does not exist in this configuration.
if (agpMajor >= 9) {
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_1_8
        }
    }
}
